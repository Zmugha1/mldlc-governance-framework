rule:
  id: "GRAG-003"
  category: "graphrag"
  subcategory: "retrieval"
  name: "one-hop-traversal"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "USE 1-hop traversal + vector instead of deep graph traversal"
  severity: "high"
  priority: 2
  applies_to:
    file_types: [".py"]
    zones: ["green", "yellow", "red"]
    always_check: true
  requirement: |
    NEVER use deep graph traversal (3+ hops) for GraphRAG retrieval.
    ALWAYS use 1-hop traversal combined with vector search.
    Why 1-hop: Most useful relationships are direct neighbors, Deep traversal causes exponential query complexity
    Recommended pattern: Find seed entities via vector search, Traverse 1 hop to get direct neighbors,
    Use vector similarity to rank neighbor relevance, Combine with RRF if using multiple sources
    This gives 90%+ of the benefit with 10x better performance.
  detection:
    patterns:
      - regex: 'depth\s*=\s*[3-9]|hops\s*=\s*[3-9]'
        message: "Deep traversal configured - consider limiting to 1-2 hops"
  enforcement:
    green:
      action: "warn"
      message: "1-hop + vector is 10x faster than deep traversal"
    yellow:
      action: "suggest"
      message: "Limit traversal to 1-2 hops for better performance"
    red:
      action: "block"
      message: "CRITICAL: 1-hop traversal required for production GraphRAG"
  references:
    - "https://towardsdatascience.com/graphrag-in-practice"
