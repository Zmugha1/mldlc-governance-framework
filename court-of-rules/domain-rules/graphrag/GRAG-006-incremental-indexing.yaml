rule:
  id: "GRAG-006"
  category: "graphrag"
  subcategory: "indexing"
  name: "incremental-graph-indexing"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "SUPPORT incremental indexing for GraphRAG updates"
  severity: "medium"
  priority: 3
  applies_to:
    file_types: [".py"]
    zones: ["yellow", "red"]
    always_check: true
  requirement: |
    ALWAYS implement incremental indexing for GraphRAG:
    1. Add new nodes/edges without rebuilding entire graph
    2. Track document versions for updates
    3. Handle entity merging (same entity, different mentions)
    4. Support document deletion (remove associated nodes)
    Benefits: Faster updates (seconds vs hours), Lower cost, Better availability (no downtime)
  enforcement:
    yellow:
      action: "suggest"
    red:
      action: "suggest"
  references: []
