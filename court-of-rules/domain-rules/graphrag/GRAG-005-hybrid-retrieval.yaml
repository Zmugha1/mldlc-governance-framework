rule:
  id: "GRAG-005"
  category: "graphrag"
  subcategory: "retrieval"
  name: "hybrid-graphrag-retrieval"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "COMBINE graph traversal with vector search for GraphRAG"
  severity: "high"
  priority: 2
  applies_to:
    file_types: [".py"]
    zones: ["green", "yellow", "red"]
    always_check: true
  requirement: |
    ALWAYS implement hybrid retrieval for GraphRAG:
    1. Global search: Community summaries for thematic questions
    2. Local search: Entity-specific with 1-hop neighbors
    3. DRIFT search: Dynamic traversal based on query
    Combine results using RRF for final ranking.
    Query routing: "What are main themes?" -> Global, "Tell me about X" -> Local, "How does X relate to Y?" -> DRIFT
  enforcement:
    green:
      action: "warn"
    yellow:
      action: "suggest"
    red:
      action: "block"
  references: []
