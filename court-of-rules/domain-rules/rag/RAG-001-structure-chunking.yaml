rule:
  id: "RAG-001"
  category: "rag"
  subcategory: "chunking"
  name: "structure-aware-chunking"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "ENFORCE structure-aware chunking instead of fixed-size chunking"
  severity: "high"
  priority: 1
  applies_to:
    file_types: [".py"]
    zones: ["green", "yellow", "red"]
    always_check: true
  requirement: |
    NEVER use fixed-size chunking (e.g., every 500 tokens) without respecting document structure.
    ALWAYS use structure-aware chunking that:
    1. Splits on headers (H1, H2, H3 for Markdown/HTML)
    2. Splits on paragraph boundaries
    3. Splits on function/class boundaries for code
    4. Preserves semantic coherence within chunks
    Chunk sizes to test: 256 / 512 / 1024 tokens
    Overlap guideline: 10-20%
    ALWAYS prefix chunks with: Document title, Section path (H1/H2/H3), Then chunk body
  detection:
    patterns:
      - regex: 'chunk_size\s*=\s*\d+[^,]*\n[^#]*text\.split\(\)'
        message: "Fixed-size chunking detected - use structure-aware chunking"
      - regex: 'def\s+chunk\([^)]*\):[^}]*for\s+i\s+in\s+range\([^)]+,\s*[^)]+\)'
        message: "Simple loop chunking - consider structure-aware approach"
  enforcement:
    green:
      action: "warn"
      message: "Consider structure-aware chunking for better retrieval quality"
    yellow:
      action: "suggest"
      message: "Structure-aware chunking improves retrieval by 10-20%"
    red:
      action: "block"
      message: "CRITICAL: Structure-aware chunking required for production RAG"
  references:
    - "https://python.langchain.com/docs/modules/data_connection/document_transformers/"
