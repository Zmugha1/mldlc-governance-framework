rule:
  id: "RAG-006"
  category: "rag"
  subcategory: "evaluation"
  name: "rag-evaluation-metrics"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "ENFORCE RAG evaluation with retrieval metrics"
  severity: "medium"
  priority: 3
  applies_to:
    file_types: [".py"]
    zones: ["yellow", "red"]
    always_check: true
  requirement: |
    ALWAYS implement evaluation for RAG systems:
    Build a golden set: 50-200 real user queries with labeled expected answers and relevant chunks
    Retrieval metrics: Recall@K, MRR (Mean Reciprocal Rank), nDCG@K
    Generation metrics: Citation coverage, Faithfulness
    Stage-level measurement: BM25 recall, Vector recall, Fused recall, Rerank lift, Latency, Cost per request
  enforcement:
    yellow:
      action: "suggest"
      message: "RAG evaluation prevents regressions"
    red:
      action: "block"
      message: "Evaluation required before production deployment"
  references: []
