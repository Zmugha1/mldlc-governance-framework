rule:
  id: "RAG-007"
  category: "rag"
  subcategory: "optimization"
  name: "rag-cost-optimization"
  version: "2.0.0"
  created: "2025-03-08"
  updated: "2025-03-08"
  author: "court-of-rules"
  description: "ENFORCE cost controls for RAG at scale"
  severity: "medium"
  priority: 3
  applies_to:
    file_types: [".py"]
    zones: ["red"]
    always_check: true
  requirement: |
    ALWAYS implement cost controls:
    1. Cache retrieval results for repeated queries
    2. Rerank only when needed (confidence gating)
    3. Right-size candidate sets (don't over-retrieve)
    4. Use cheaper models for development (GPT-4o-mini)
    5. Consider two-stage rerank (cheap then expensive)
    Cost per 1K queries: Basic RAG $2-5, With reranking $3-7, Hybrid+Reranking $4-10
  enforcement:
    red:
      action: "suggest"
      message: "Cost controls prevent budget overruns at scale"
  references: []
