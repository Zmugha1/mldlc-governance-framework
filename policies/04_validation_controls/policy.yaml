# Validation Controls Policy
# CV, stability, calibration, fairness (4/5ths rule)

min_baseline_lift_pct: 0.05
cv_method: stratified_kfold
n_folds: 5

stability:
  max_drift_threshold: 0.02
  confidence_interval: 0.95

fairness:
  four_fifths_rule_required: true
  protected_attributes: []  # Configure per use case

calibration_required: true
