name: Build Coach Bot

on:
  push:
    branches: [dev]
  workflow_dispatch:

defaults:
  run:
    working-directory: Sandi_Bot_Desktop

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run tauri:build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: coach-bot-windows
          path: |
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/msi/*.msi
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build Mac installer
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: coach-bot-mac
          path: |
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/dmg/*.dmg
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/macos/*.app
          retention-days: 30
