name: Build Coach Bot

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download pdfium Windows
        working-directory: Sandi_Bot_Desktop
        run: |
          curl -L -o pdfium.zip "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-windows-x64.zip"
          unzip pdfium.zip -d pdfium_extracted
          copy pdfium_extracted\bin\pdfium.dll src-tauri\pdfium.dll
        shell: cmd

      - name: Install dependencies
        working-directory: Sandi_Bot_Desktop
        run: npm install

      - name: Build Windows installer
        working-directory: Sandi_Bot_Desktop
        run: npm run tauri:build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: coach-bot-windows
          path: |
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/msi/*.msi
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - name: Download pdfium Mac
        working-directory: Sandi_Bot_Desktop
        run: |
          curl -L -o pdfium.zip "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.zip"
          unzip pdfium.zip -d pdfium_extracted
          cp pdfium_extracted/lib/libpdfium.dylib src-tauri/libpdfium.dylib

      - name: Install dependencies
        working-directory: Sandi_Bot_Desktop
        run: npm install

      - name: Build Mac installer
        working-directory: Sandi_Bot_Desktop
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: coach-bot-mac
          path: |
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/dmg/*.dmg
            Sandi_Bot_Desktop/src-tauri/target/release/bundle/macos/*.app
          retention-days: 30
